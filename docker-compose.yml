services:
  # ---------------------------------------------------------------------------
  # EXTERNAL API SERVICE
  # ---------------------------------------------------------------------------
  external-api:
    build: .
    container_name: external_api
    restart: unless-stopped
    ports:
      - "${EXTERNAL_API_PORT:-8001}:8080"
    env_file:
      - .env
    environment:
      DB_URL: ${EXTERNAL_API_DB_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      MINIO_URL: ${EXTERNAL_API_MINIO_URL:-http://minio:9000}
      S3_ENDPOINT: ${EXTERNAL_API_S3_ENDPOINT:-http://minio:9000}
      PORT: "8080"
    networks:
      - auditoria-app-network

networks:
  auditoria-app-network:
    external: true
    name: ${AUDITORIA_APP_NETWORK:-auditoria-app_default}
